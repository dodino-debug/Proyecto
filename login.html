<!DOCTYPE html>
<html lang="es" data-base-path="./">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - DOVI S.A.S.</title>
  <link href="assets/img/favicon-64.png" rel="icon">
 
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/main.css" rel="stylesheet">
  <link href="assets/css/custom.css" rel="stylesheet">
</head>
<body class="login-bg d-flex flex-column justify-content-between">

  <header id="auth-header" class="p-3"></header>

  <main class="container my-auto">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-4">
        
        <div class="text-center mb-4">
          <h2 class="fw-bold text-white">Iniciar Sesión</h2>
          <div class="linea-decorativa linea-decorativa-orange"></div>
        </div>

        <div class="alert alert-danger alert-dismissible fade show text-center d-none" id="login-error" role="alert">
          <span id="error-text">Credenciales incorrectas.</span>
          <button type="button" class="btn-close" onclick="document.getElementById('login-error').classList.add('d-none')"></button>
        </div>

        <div class="alert alert-info alert-dismissible fade show text-center d-none" id="redirect-message" role="alert">
          <span>Acceso denegado. Se requieren permisos de Administrador.</span>
          <button type="button" class="btn-close" onclick="document.getElementById('redirect-message').classList.add('d-none')"></button>
        </div>

        <form id="login-form">
          <div class="mb-3">
            <label for="email" class="form-label small fw-semibold text-white-50">Correo Electrónico</label>
            <div class="input-group">
              <span class="input-group-text form-control-dovi login-input-group-text"><i class="bi bi-envelope text-white-50"></i></span>
              <input type="email" class="form-control form-control-dovi login-input-control" id="email" name="email" placeholder="@gmail.com" required>
            </div>
          </div>

          <div class="mb-3">
            <div class="d-flex justify-content-between">
              <label for="password" class="form-label small fw-semibold text-white-50">Contraseña</label>
              <a href="#" class="text-orange text-decoration-none small">¿La olvidaste?</a>
            </div>
            <div class="input-group">
              <span class="input-group-text form-control-dovi login-input-group-text"><i class="bi bi-lock text-white-50"></i></span>
              <input type="password" class="form-control form-control-dovi login-input-control" id="password" name="password" required>
            </div>
          </div>

          <div class="mb-4 form-check">
            <input type="checkbox" class="form-check-input pointer-click" id="rememberMe">
            <label class="form-check-label text-white-50 small pointer-click" for="rememberMe">Recordar mi sesión</label>
          </div>

          <button type="submit" class="btn btn-dovi w-100 py-2.5 fw-bold text-uppercase login-btn-submit">Ingresar</button>
        </form>

        <div class="text-center mt-4">
          <p class="text-white-50 small mb-0">¿No tienes cuenta? <a href="registro.html" class="text-orange text-decoration-none fw-semibold">Regístrate aquí</a></p>
        </div>

      </div>
    </div>
  </main>

  <footer class="text-center py-3 text-white-50 small" id="auth-footer"></footer>

  <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <!-- Database Mock and Session management -->
  <script src="assets/js/db-mock.js"></script>

  <script>
    // Load components in parallel, then initialize authentication controller
    Promise.all([
      window.HeaderView.renderHeader(),
      window.FooterView.renderFooter()
    ]).then(() => {
      window.AuthController.initLogin();
    }).catch(err => console.error("Error loading layout components:", err));
  </script>
</body>
</html>
